name: Release Components

on:
  release:
    types: [published]

jobs:
  release-microcontroller:
    name: Build and Upload microcontroller
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP of 'microcontroller' directory
        run: zip -r release-microcontroller-${{ github.ref_name }}.zip microcontroller

      - name: Upload microcontroller ZIP to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./release-microcontroller-${{ github.ref_name }}.zip
          asset_name: release-microcontroller-${{ github.ref_name }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  release-lang-cli-notebook:
    name: Publish @bscript/lang, @bscript/cli, and @bscript/notebook
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            NPM_TAG=$(node -e "
              const m = process.argv[1].match(/-([0-9A-Za-z-]+)/);
              if (!m) {
                console.error('::error::GitHub pre-release requires a semver prerelease segment (e.g. 2.0.0-alpha.1)');
                process.exit(1);
              }
              process.stdout.write(m[1]);
            " "$TAG_VERSION")
            echo "Pre-release: publishing to npm dist-tag '${NPM_TAG}' (version ${TAG_VERSION})"
          else
            if [[ "$TAG_VERSION" == *-* ]]; then
              echo "::error::Stable GitHub release must not use a prerelease version (${TAG_VERSION}). Mark the release as pre-release or use a stable version."
              exit 1
            fi
            NPM_TAG="latest"
            echo "Stable release: publishing to npm dist-tag 'latest' (version ${TAG_VERSION})"
          fi

          echo "tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify Version of @bscript/lang Matches Tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./lang/package.json').version")
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version Mismatch! Tag ($TAG_VERSION) != ./lang/package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check of @bscript/lang passed: $TAG_VERSION"

      - name: Verify Version of @bscript/cli Matches Tag and @bscript/cli Installs Correct @bscript/lang Version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          DEP_LANG_VERSION=$(node -p "require('./cli/package.json').dependencies['@bscript/lang']")
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version Mismatch! Tag ($TAG_VERSION) != ./cli/package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$DEP_LANG_VERSION" ]; then
            echo "::error::Version Mismatch! @bscript/lang@($DEP_LANG_VERSION) in dependencies is incorrect."
            exit 1
          fi
          echo "Version check of @bscript/cli passed: $TAG_VERSION"

      - name: Verify Version of @bscript/notebook Matches Tag and @bscript/notebook Installs Correct @bscript/lang Version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./notebook/package.json').version")
          DEP_LANG_VERSION=$(node -p "require('./notebook/package.json').dependencies['@bscript/lang']")
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version Mismatch! Tag ($TAG_VERSION) != ./notebook/package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$DEP_LANG_VERSION" ]; then
            echo "::error::Version Mismatch! @bscript/lang@($DEP_LANG_VERSION) in dependencies is incorrect."
            exit 1
          fi
          echo "Version check of @bscript/notebook passed: $TAG_VERSION"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages
        run: npm run build --workspaces --if-present

      - name: Publish @bscript/lang to npm
        working-directory: ./lang
        run: npm publish --tag ${{ steps.npm_tag.outputs.tag }} || echo 'Failed or skipped publishing @bscript/lang'

      - name: Publish @bscript/cli to npm
        working-directory: ./cli
        run: npm publish --tag ${{ steps.npm_tag.outputs.tag }} || echo 'Failed or skipped publishing @bscript/cli'
        
      - name: Publish @bscript/notebook to npm
        working-directory: ./notebook
        run: npm publish --tag ${{ steps.npm_tag.outputs.tag }} || echo 'Failed or skipped publishing @bscript/notebook'
